.code{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:clamp(84px,18vw,128px);line-height:1;letter-spacing:.02em;

p.en{font-size:12.5px;color:rgba(36,28,24,.5);margin-bottom:28px}
.row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 26px;border-radius:999px;font-weight:700;font-size:14.5px;text-decoration:none;transition:translate .35s cubic-bezier(.22,1,.36,1),box-shadow .35s ease,scale .2s ease}
.btn:active{scale:.96}
.b1{color:#fff;background:linear-gradient(135deg,#ED7D96,#DB5E78);box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 12px 28px -8px rgba(236,90,120,.65)}
.b1:hover{translate:0 -2px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 16px 34px -10px rgba(236,90,120,.75)}
.b2{color:#241C18;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.55);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 8px 20px -8px rgba(12,4,30,.3)}
